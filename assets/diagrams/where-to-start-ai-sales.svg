<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Where Should I Start?</title>
  <desc id="description">Four playful illustrated cards show equal starting points for using AI in sales: Starting From Scratch, Used It a Bit, Used It a Lot and AI Wizard. Start where the work feels useful. More technical does not automatically mean more valuable.</desc>

  <rect width="1600" height="900" fill="#fffdf7"/>
  <circle cx="85" cy="92" r="34" fill="#e9c46a" opacity="0.35"/>
  <circle cx="1515" cy="744" r="54" fill="#2a9d8f" opacity="0.12"/>
  <path d="M92 760c44-24 82-22 126 4" fill="none" stroke="#2a9d8f" stroke-width="7" stroke-linecap="round"/>
  <path d="M105 786c36-17 67-15 99 4" fill="none" stroke="#e9c46a" stroke-width="7" stroke-linecap="round"/>

  <text x="800" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#152238">Where Should I Start?</text>
  <text x="800" y="116" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" fill="#334155">Choose the starting point that sounds most like you.</text>
  <text x="800" y="154" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" fill="#334155">You do not need to begin with the most advanced option.</text>

  <path d="M380 240l7 17 18 7-18 8-7 17-8-17-17-8 17-7z" fill="#e9c46a"/>
  <path d="M780 204l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#2a9d8f"/>
  <path d="M1180 242l7 17 18 7-18 8-7 17-8-17-17-8 17-7z" fill="#e9c46a"/>

  <g transform="rotate(-2 220 425)" font-family="Inter, Arial, sans-serif">
    <rect x="46" y="200" width="340" height="490" rx="34" fill="#dff5f1"/>
    <rect x="58" y="212" width="340" height="490" rx="34" fill="#ffffff" stroke="#2a9d8f" stroke-width="4"/>
    <circle cx="110" cy="264" r="32" fill="#2a9d8f"/>
    <text x="110" y="276" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">1</text>
    <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="228" cy="345" r="50" fill="#fffdf7"/>
      <path d="M228 282v63"/>
      <path d="M193 316a50 50 0 1 0 70 0"/>
    </g>
    <path d="M302 300l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#e9c46a"/>
    <text x="228" y="441" text-anchor="middle" font-size="33" font-weight="800" fill="#152238">
      <tspan x="228">Starting From</tspan>
      <tspan x="228" dy="38">Scratch</tspan>
    </text>
    <text x="228" y="548" text-anchor="middle" font-size="26" fill="#334155">Set up your AI</text>
    <path d="M174 582c31 12 77 12 108 0" fill="none" stroke="#2a9d8f" stroke-width="6" stroke-linecap="round"/>
    <text x="228" y="628" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="228">Try one guided</tspan>
      <tspan x="228" dy="34">example</tspan>
    </text>
  </g>

  <g transform="rotate(1.5 600 425)" font-family="Inter, Arial, sans-serif">
    <rect x="432" y="214" width="340" height="490" rx="34" fill="#dbe5eb"/>
    <rect x="420" y="202" width="340" height="490" rx="34" fill="#ffffff" stroke="#152238" stroke-width="4"/>
    <circle cx="472" cy="254" r="32" fill="#152238"/>
    <text x="472" y="266" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">2</text>
    <g fill="none" stroke="#2a9d8f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="577" cy="335" r="28" fill="#dff5f1"/>
      <path d="M520 409c9-37 29-55 57-55s48 18 57 55" fill="#dff5f1"/>
      <path d="M653 293l10 20 23 4-17 16 4 23-20-11-20 11 4-23-17-16 23-4z" fill="#fffdf7"/>
    </g>
    <text x="590" y="472" text-anchor="middle" font-size="33" font-weight="800" fill="#152238">Used It a Bit</text>
    <text x="590" y="530" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="590">Add context about</tspan>
      <tspan x="590" dy="34">your role</tspan>
    </text>
    <path d="M536 600c31 12 77 12 108 0" fill="none" stroke="#e9c46a" stroke-width="6" stroke-linecap="round"/>
    <text x="590" y="642" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="590">Use one real sales</tspan>
      <tspan x="590" dy="34">workflow</tspan>
    </text>
  </g>

  <g transform="rotate(-1.4 980 425)" font-family="Inter, Arial, sans-serif">
    <rect x="812" y="200" width="340" height="500" rx="34" fill="#bfe8e1"/>
    <rect x="824" y="212" width="340" height="500" rx="34" fill="#ffffff" stroke="#2a9d8f" stroke-width="4"/>
    <circle cx="876" cy="264" r="32" fill="#2a9d8f"/>
    <text x="876" y="276" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">3</text>
    <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M908 300h108a18 18 0 0 1 18 18v52a18 18 0 0 1-18 18h-49l-29 26v-26h-30a18 18 0 0 1-18-18v-52a18 18 0 0 1 18-18z" fill="#fffdf7"/>
      <path d="M995 330l15 15 29-33"/>
    </g>
    <path d="M1080 296l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#e9c46a"/>
    <text x="994" y="472" text-anchor="middle" font-size="33" font-weight="800" fill="#152238">Used It a Lot</text>
    <text x="994" y="530" text-anchor="middle" font-size="25" fill="#334155">
      <tspan x="994">Turn repeated prompts</tspan>
      <tspan x="994" dy="34">into skills</tspan>
    </text>
    <path d="M940 600c31 12 77 12 108 0" fill="none" stroke="#2a9d8f" stroke-width="6" stroke-linecap="round"/>
    <text x="994" y="642" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="994">Measure what</tspan>
      <tspan x="994" dy="34">actually helps</tspan>
    </text>
  </g>

  <g transform="rotate(1.8 1360 425)" font-family="Inter, Arial, sans-serif">
    <rect x="1192" y="214" width="340" height="490" rx="34" fill="#f5d982"/>
    <path d="M1180 202h340a34 34 0 0 1 34 34v422a34 34 0 0 1-34 34h-122l-38 34-3-34h-177a34 34 0 0 1-34-34V236a34 34 0 0 1 34-34z" fill="#fff7e0" stroke="#e9c46a" stroke-width="5"/>
    <circle cx="1198" cy="254" r="32" fill="#e9c46a"/>
    <text x="1198" y="266" text-anchor="middle" font-size="32" font-weight="800" fill="#152238">4</text>
    <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="1350" cy="345" r="31" fill="#ffffff"/>
      <circle cx="1268" cy="296" r="16" fill="#ffffff"/>
      <circle cx="1432" cy="296" r="16" fill="#ffffff"/>
      <circle cx="1268" cy="396" r="16" fill="#ffffff"/>
      <circle cx="1432" cy="396" r="16" fill="#ffffff"/>
      <path d="M1323 329l-40-24M1377 329l40-24M1323 361l-40 24M1377 361l40 24"/>
    </g>
    <path d="M1462 320l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#2a9d8f"/>
    <text x="1350" y="472" text-anchor="middle" font-size="33" font-weight="800" fill="#152238">AI Wizard</text>
    <text x="1350" y="530" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="1350">Connect tools</tspan>
      <tspan x="1350" dy="34">carefully</tspan>
    </text>
    <path d="M1296 600c31 12 77 12 108 0" fill="none" stroke="#e9c46a" stroke-width="6" stroke-linecap="round"/>
    <text x="1350" y="642" text-anchor="middle" font-size="26" fill="#334155">
      <tspan x="1350">Keep people</tspan>
      <tspan x="1350" dy="34">in control</tspan>
    </text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <path d="M292 746h1016a28 28 0 0 1 28 28v72a28 28 0 0 1-28 28H866l-36 27-3-27H292a28 28 0 0 1-28-28v-72a28 28 0 0 1 28-28z" fill="#fff7e0" stroke="#e9c46a" stroke-width="5"/>
    <circle cx="326" cy="800" r="29" fill="#e9c46a"/>
    <g fill="none" stroke="#152238" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="326" cy="791" r="9"/>
      <path d="M309 820c4-14 9-21 17-21s13 7 17 21"/>
    </g>
    <text x="382" y="797" font-size="27" font-weight="700" fill="#152238">Start where the work feels useful.</text>
    <text x="382" y="839" font-size="27" fill="#334155">More technical does not automatically mean more valuable.</text>
  </g>

  <path d="M1490 100l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#2a9d8f"/>
  <path d="M1530 140l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#e9c46a"/>
</svg>
