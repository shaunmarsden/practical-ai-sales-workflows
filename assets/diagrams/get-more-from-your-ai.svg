<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" style="background-color: #ffffff; font-family: 'Inter', 'Segoe UI', Arial, sans-serif;">
  
  <!-- Background -->
  <rect width="1600" height="900" fill="#ffffff" />

  <!-- Title -->
  <text x="800" y="70" text-anchor="middle" font-size="30" font-weight="700" fill="#152238">Get More From Your AI</text>

  <!-- Main Point Callout Banner -->
  <rect x="60" y="115" width="1480" height="60" rx="10" fill="#F4F6F8" stroke="#2A9D8F" stroke-width="2" />
  <text x="800" y="151" text-anchor="middle" font-size="14" font-weight="700" fill="#152238">Move up a layer only when the one you are on stops saving you time, not because the next one sounds more advanced.</text>

  <!-- STAGE 1 -->
  <g id="stage-1">
    <rect x="60" y="220" width="265" height="300" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="100" y="235" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="192.5" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Stage 1</text>
    
    <!-- Icon -->
    <circle cx="192.5" cy="325" r="30" fill="#ffffff" stroke="#2A9D8F" stroke-width="2" />
    <rect x="180.5" y="310" width="24" height="30" rx="2" fill="none" stroke="#2A9D8F" stroke-width="2.2" />
    <line x1="185.5" y1="318" x2="199.5" y2="318" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" />
    <line x1="185.5" y1="324" x2="199.5" y2="324" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" />
    <line x1="185.5" y1="330" x2="194.5" y2="330" stroke="#2A9D8F" stroke-width="2.2" stroke-linecap="round" />
    
    <!-- Text -->
    <text x="192.5" y="420" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">A single setup prompt</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <path d="M 328 370 L 360 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 2 -->
  <g id="stage-2">
    <rect x="363" y="220" width="265" height="300" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="403" y="235" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="495.5" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Stage 2</text>
    
    <!-- Icon -->
    <circle cx="495.5" cy="325" r="30" fill="#ffffff" stroke="#2A9D8F" stroke-width="2" />
    <path d="M 480.5 315 L 480.5 333 L 510.5 333 L 510.5 321 L 494.5 321 L 490.5 315 Z" fill="none" stroke="#2A9D8F" stroke-width="2.2" stroke-linejoin="round" />
    
    <!-- Text -->
    <text x="495.5" y="410" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">A project with real</text>
    <text x="495.5" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">reference material</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <path d="M 631 370 L 663 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 3 -->
  <g id="stage-3">
    <rect x="666" y="220" width="265" height="300" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="706" y="235" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="798.5" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Stage 3</text>
    
    <!-- Icon -->
    <circle cx="798.5" cy="325" r="30" fill="#ffffff" stroke="#2A9D8F" stroke-width="2" />
    <circle cx="798.5" cy="325" r="12" fill="none" stroke="#2A9D8F" stroke-width="2.2" />
    <circle cx="798.5" cy="325" r="4" fill="#2A9D8F" />
    <line x1="798.5" y1="310" x2="798.5" y2="340" stroke="#2A9D8F" stroke-width="2" />
    <line x1="783.5" y1="325" x2="813.5" y2="325" stroke="#2A9D8F" stroke-width="2" />
    
    <!-- Text -->
    <text x="798.5" y="410" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">Repeatable skills,</text>
    <text x="798.5" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">not reworded prompts</text>
  </g>

  <!-- Arrow 3 -> 4 -->
  <path d="M 934 370 L 966 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 4 -->
  <g id="stage-4">
    <rect x="969" y="220" width="265" height="300" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="1009" y="235" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="1101.5" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Stage 4</text>
    
    <!-- Icon -->
    <circle cx="1101.5" cy="325" r="30" fill="#ffffff" stroke="#2A9D8F" stroke-width="2" />
    <circle cx="1095.5" cy="325" r="8" fill="none" stroke="#2A9D8F" stroke-width="2.2" />
    <circle cx="1107.5" cy="325" r="8" fill="none" stroke="#2A9D8F" stroke-width="2.2" />
    <line x1="1097.5" y1="325" x2="1105.5" y2="325" stroke="#2A9D8F" stroke-width="2.5" />
    
    <!-- Text -->
    <text x="1101.5" y="410" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">Live connections</text>
    <text x="1101.5" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">to your actual tools</text>
  </g>

  <!-- Arrow 4 -> 5 (Dashed Caution Transition) -->
  <path d="M 1237 370 L 1269 370" stroke="#E9C46A" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-amber)" />

  <!-- STAGE 5 (High Caution & Human Oversight Distinct Style) -->
  <g id="stage-5">
    <rect x="1272" y="220" width="265" height="300" rx="12" fill="#FFFDF5" stroke="#E9C46A" stroke-width="3" />
    <rect x="1312" y="235" width="185" height="32" rx="16" fill="#E9C46A" />
    <text x="1404.5" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#152238">Stage 5</text>
    
    <!-- Icon (Warning Triangle) -->
    <circle cx="1404.5" cy="325" r="30" fill="#ffffff" stroke="#E9C46A" stroke-width="2" />
    <path d="M 1404.5 310 L 1388.5 337 L 1420.5 337 Z" fill="#E9C46A" stroke="#152238" stroke-width="2.2" stroke-linejoin="round" />
    <line x1="1404.5" y1="316" x2="1404.5" y2="328" stroke="#152238" stroke-width="2.5" stroke-linecap="round" />
    <line x1="1404.5" y1="332" x2="1404.5" y2="333" stroke="#152238" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Text -->
    <text x="1404.5" y="410" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">Automations and agents</text>
    <text x="1404.5" y="430" text-anchor="middle" font-size="15" font-weight="700" fill="#152238">acting on your behalf</text>
  </g>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2A9D8F" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#E9C46A" />
    </marker>
  </defs>

</svg>
