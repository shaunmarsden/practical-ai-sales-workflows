<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 46px; font-weight: 800; fill: #152238; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #152238; }
      .card-heading { font-family: Inter, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #FFFFFF; }
      .card-body { font-family: Inter, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #152238; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF" />

  <text x="800" y="65" text-anchor="middle" class="title">Get More From Your AI</text>

  <rect x="60" y="100" width="1480" height="60" rx="10" fill="#F4F6F8" stroke="#2A9D8F" stroke-width="2" />
  <text x="800" y="136" text-anchor="middle" class="subtitle">Move up a layer only when the one you are on stops saving you time, not because the next one sounds more advanced.</text>

  <!-- STAGE 1: a single setup prompt -->
  <g id="stage-1">
    <rect x="60" y="205" width="265" height="330" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="100" y="220" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="192.5" y="241" text-anchor="middle" class="card-heading">Stage 1</text>

    <!-- Icon: speech bubble with a spark -->
    <g transform="translate(152, 275)">
      <path d="M 4 4 L 76 4 C 80 4 83 7 83 11 L 83 47 C 83 51 80 54 76 54 L 30 54 L 14 68 L 16 54 L 11 54 C 7 54 4 51 4 47 Z"
            fill="none" stroke="#2A9D8F" stroke-width="4" stroke-linejoin="round" />
      <path d="M 92 8 L 96 18 L 106 22 L 96 26 L 92 36 L 88 26 L 78 22 L 88 18 Z" fill="#2A9D8F" stroke="none" />
    </g>

    <text x="192.5" y="400" text-anchor="middle" class="card-body">
      <tspan x="192.5" dy="0">A single setup</tspan>
      <tspan x="192.5" dy="24">prompt</tspan>
    </text>
  </g>

  <path d="M 328 370 L 360 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 2: a project with real reference material -->
  <g id="stage-2">
    <rect x="363" y="205" width="265" height="330" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="403" y="220" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="495.5" y="241" text-anchor="middle" class="card-heading">Stage 2</text>

    <!-- Icon: folder with document peeking out -->
    <g transform="translate(455, 275)">
      <rect x="10" y="8" width="42" height="18" rx="4" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="3.5" />
      <path d="M 4 20 L 4 62 C 4 66 7 69 11 69 L 79 69 C 83 69 86 66 86 62 L 86 30 C 86 26 83 23 79 23 L 34 23 L 28 14 Z"
            fill="none" stroke="#2A9D8F" stroke-width="4" stroke-linejoin="round" />
    </g>

    <text x="495.5" y="400" text-anchor="middle" class="card-body">
      <tspan x="495.5" dy="0">A project with</tspan>
      <tspan x="495.5" dy="24">real reference material</tspan>
    </text>
  </g>

  <path d="M 631 370 L 663 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 3: repeatable skills -->
  <g id="stage-3">
    <rect x="666" y="205" width="265" height="330" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="706" y="220" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="798.5" y="241" text-anchor="middle" class="card-heading">Stage 3</text>

    <!-- Icon: repeat cycle with a checkmark -->
    <g transform="translate(758, 275)" fill="none" stroke="#2A9D8F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 8 34 A 26 26 0 0 1 60 20" />
      <path d="M 52 12 L 60 20 L 50 26" />
      <path d="M 60 34 A 26 26 0 0 1 8 48" />
      <path d="M 16 56 L 8 48 L 18 42" />
      <path d="M 24 34 L 31 41 L 44 26" stroke-width="4.5" />
    </g>

    <text x="798.5" y="400" text-anchor="middle" class="card-body">
      <tspan x="798.5" dy="0">Repeatable skills, not</tspan>
      <tspan x="798.5" dy="24">reworded prompts</tspan>
    </text>
  </g>

  <path d="M 934 370 L 966 370" stroke="#2A9D8F" stroke-width="2.5" fill="none" marker-end="url(#arrow-teal)" />

  <!-- STAGE 4: live connections -->
  <g id="stage-4">
    <rect x="969" y="205" width="265" height="330" rx="12" fill="#F4F6F8" stroke="#C1C9D2" stroke-width="1.5" />
    <rect x="1009" y="220" width="185" height="32" rx="16" fill="#2A9D8F" />
    <text x="1101.5" y="241" text-anchor="middle" class="card-heading">Stage 4</text>

    <!-- Icon: two connected nodes with a live pulse -->
    <g transform="translate(1058, 285)" fill="none" stroke="#2A9D8F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="24" r="12" fill="#FFFFFF" />
      <circle cx="76" cy="24" r="12" fill="#FFFFFF" />
      <line x1="24" y1="24" x2="42" y2="24" />
      <path d="M 42 24 L 48 12 L 54 34 L 60 24 L 64 24" />
      <line x1="64" y1="24" x2="64" y2="24" />
    </g>

    <text x="1101.5" y="400" text-anchor="middle" class="card-body">
      <tspan x="1101.5" dy="0">Live connections to</tspan>
      <tspan x="1101.5" dy="24">your actual tools</tspan>
    </text>
  </g>

  <path d="M 1237 370 L 1269 370" stroke="#E9C46A" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-amber)" />

  <!-- STAGE 5: automations and agents, distinct caution style -->
  <g id="stage-5">
    <rect x="1272" y="205" width="265" height="330" rx="12" fill="#FFFCF0" stroke="#E9C46A" stroke-width="3" />
    <rect x="1312" y="220" width="185" height="32" rx="16" fill="#E9C46A" />
    <text x="1404.5" y="241" text-anchor="middle" class="card-heading" fill="#152238">Stage 5</text>

    <!-- Icon: a gear (automated action) with a caution triangle badge -->
    <g transform="translate(1358, 275)">
      <g transform="translate(6, 6)" fill="none" stroke="#E9C46A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="28" cy="28" r="15" />
        <circle cx="28" cy="28" r="5" fill="#E9C46A" stroke="none" />
        <line x1="28" y1="3" x2="28" y2="11" />
        <line x1="28" y1="45" x2="28" y2="53" />
        <line x1="3" y1="28" x2="11" y2="28" />
        <line x1="45" y1="28" x2="53" y2="28" />
        <line x1="9" y1="9" x2="15" y2="15" />
        <line x1="41" y1="41" x2="47" y2="47" />
        <line x1="47" y1="9" x2="41" y2="15" />
        <line x1="15" y1="41" x2="9" y2="47" />
      </g>
      <path d="M 58 46 L 78 46 L 68 28 Z" fill="#E9C46A" stroke="#152238" stroke-width="2.5" stroke-linejoin="round" />
      <line x1="68" y1="36" x2="68" y2="41" stroke="#152238" stroke-width="2.5" stroke-linecap="round" />
      <circle cx="68" cy="44.5" r="1.4" fill="#152238" />
    </g>

    <text x="1404.5" y="400" text-anchor="middle" class="card-body" fill="#152238">
      <tspan x="1404.5" dy="0">Automations and agents</tspan>
      <tspan x="1404.5" dy="24">acting on your behalf</tspan>
    </text>
  </g>

  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2A9D8F" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#E9C46A" />
    </marker>
  </defs>
</svg>
