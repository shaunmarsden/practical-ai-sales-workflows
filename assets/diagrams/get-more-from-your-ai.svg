<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title description">
  <title id="title">Get More From Your AI</title>
  <desc id="description">A playful winding path through five stages: a setup prompt, a project with reference material, repeatable skills, live connections, and finally automations and agents that need extra care.</desc>

  <rect width="1600" height="820" fill="#fffdf7"/>
  <circle cx="115" cy="112" r="48" fill="#2a9d8f" opacity="0.12"/>
  <circle cx="1490" cy="690" r="66" fill="#e9c46a" opacity="0.25"/>

  <text x="800" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800" fill="#152238">Get More From Your AI</text>
  <text x="800" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#334155">Only move up when it actually helps.</text>

  <path d="M220 330C340 170 420 170 540 295S740 460 830 310s190-165 285-10 185 174 285 38" fill="none" stroke="#dbe5eb" stroke-width="38" stroke-linecap="round"/>
  <path d="M220 330C340 170 420 170 540 295S740 460 830 310s190-165 285-10 185 174 285 38" fill="none" stroke="#2a9d8f" stroke-width="8" stroke-linecap="round" stroke-dasharray="13 18"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="rotate(-3 220 330)">
      <circle cx="220" cy="330" r="100" fill="#dff5f1" stroke="#2a9d8f" stroke-width="6"/>
      <circle cx="155" cy="255" r="32" fill="#2a9d8f"/>
      <text x="155" y="267" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">1</text>
      <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M173 310h85a18 18 0 0 1 18 18v42a18 18 0 0 1-18 18h-43l-25 23v-23h-17a18 18 0 0 1-18-18v-42a18 18 0 0 1 18-18z" fill="#ffffff"/>
        <path d="M285 290l7 17 17 7-17 7-7 17-7-17-17-7 17-7z" fill="#e9c46a" stroke="none"/>
      </g>
      <rect x="75" y="455" width="290" height="118" rx="24" fill="#ffffff" stroke="#dce4e8" stroke-width="3"/>
      <text x="220" y="500" text-anchor="middle" font-size="31" font-weight="800" fill="#152238">A Setup Prompt</text>
      <text x="220" y="540" text-anchor="middle" font-size="25" fill="#334155">Give your AI useful context</text>
    </g>

    <g transform="rotate(2 520 250)">
      <circle cx="520" cy="250" r="100" fill="#ffffff" stroke="#152238" stroke-width="6"/>
      <circle cx="455" cy="175" r="32" fill="#152238"/>
      <text x="455" y="187" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">2</text>
      <g fill="none" stroke="#2a9d8f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M468 260h55l17-28h57a15 15 0 0 1 15 15v76a15 15 0 0 1-15 15H468a15 15 0 0 1-15-15v-48a15 15 0 0 1 15-15z" fill="#dff5f1"/>
        <rect x="515" y="214" width="66" height="76" rx="9" fill="#ffffff"/>
        <path d="M531 240h34M531 262h26"/>
      </g>
      <rect x="375" y="375" width="290" height="142" rx="24" fill="#ffffff" stroke="#dce4e8" stroke-width="3"/>
      <text x="520" y="420" text-anchor="middle" font-size="31" font-weight="800" fill="#152238">A Project</text>
      <text x="520" y="460" text-anchor="middle" font-size="25" fill="#334155">
        <tspan x="520">Add real reference material</tspan>
        <tspan x="520" dy="32">for repeated work</tspan>
      </text>
    </g>

    <g transform="rotate(-2 820 360)">
      <circle cx="820" cy="360" r="100" fill="#dff5f1" stroke="#2a9d8f" stroke-width="6"/>
      <circle cx="755" cy="285" r="32" fill="#2a9d8f"/>
      <text x="755" y="297" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">3</text>
      <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M762 365a54 54 0 0 1 96-28"/>
        <path d="M842 316l17 20-24 10"/>
        <path d="M858 386a54 54 0 0 1-96 28"/>
        <path d="M778 435l-17-20 24-10"/>
        <path d="M790 379l18 18 36-42" stroke="#2a9d8f"/>
      </g>
      <rect x="675" y="485" width="290" height="142" rx="24" fill="#ffffff" stroke="#dce4e8" stroke-width="3"/>
      <text x="820" y="530" text-anchor="middle" font-size="31" font-weight="800" fill="#152238">Repeatable Skills</text>
      <text x="820" y="570" text-anchor="middle" font-size="25" fill="#334155">
        <tspan x="820">Reuse a tested process,</tspan>
        <tspan x="820" dy="32">not a reworded prompt</tspan>
      </text>
    </g>

    <g transform="rotate(2.5 1110 250)">
      <circle cx="1110" cy="250" r="100" fill="#ffffff" stroke="#152238" stroke-width="6"/>
      <circle cx="1045" cy="175" r="32" fill="#152238"/>
      <text x="1045" y="187" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">4</text>
      <g fill="none" stroke="#2a9d8f" stroke-width="8" stroke-linecap="round">
        <circle cx="1066" cy="260" r="24"/>
        <circle cx="1160" cy="260" r="24"/>
        <path d="M1090 260h46"/>
        <path d="M1102 260l12-18 14 36 12-18"/>
      </g>
      <rect x="965" y="375" width="290" height="142" rx="24" fill="#ffffff" stroke="#dce4e8" stroke-width="3"/>
      <text x="1110" y="420" text-anchor="middle" font-size="31" font-weight="800" fill="#152238">Live Connections</text>
      <text x="1110" y="460" text-anchor="middle" font-size="25" fill="#334155">
        <tspan x="1110">Connect approved tools</tspan>
        <tspan x="1110" dy="32">to prepare real work</tspan>
      </text>
    </g>

    <g transform="rotate(-2 1400 350)">
      <circle cx="1400" cy="350" r="110" fill="#fff7e0" stroke="#e9c46a" stroke-width="8"/>
      <circle cx="1328" cy="268" r="34" fill="#e9c46a"/>
      <text x="1328" y="281" text-anchor="middle" font-size="34" font-weight="800" fill="#152238">5</text>
      <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="1365" cy="350" r="37"/>
        <circle cx="1365" cy="350" r="9" fill="#e9c46a"/>
        <path d="M1365 298v17M1365 385v17M1313 350h17M1400 350h17M1328 313l13 13M1389 374l13 13M1402 313l-13 13M1341 374l-13 13"/>
        <path d="M1410 402l34-58 34 58z" fill="#e9c46a"/>
        <path d="M1444 365v18M1444 392h1"/>
      </g>
      <rect x="1245" y="500" width="310" height="152" rx="26" fill="#fff7e0" stroke="#e9c46a" stroke-width="5"/>
      <text x="1400" y="535" text-anchor="middle" font-size="29" font-weight="800" fill="#152238">
        <tspan x="1400">Automations</tspan>
        <tspan x="1400" dy="32">and Agents</tspan>
      </text>
      <text x="1400" y="610" text-anchor="middle" font-size="24" fill="#334155">
        <tspan x="1400">Extra care when AI can</tspan>
        <tspan x="1400" dy="32">act on your behalf</tspan>
      </text>
    </g>
  </g>

  <path d="M88 700c46-25 88-24 131 2" fill="none" stroke="#2a9d8f" stroke-width="8" stroke-linecap="round"/>
  <path d="M103 730c35-18 67-17 98 2" fill="none" stroke="#e9c46a" stroke-width="8" stroke-linecap="round"/>
  <text x="800" y="765" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" fill="#152238">The most advanced option is not automatically the most useful one.</text>
</svg>
