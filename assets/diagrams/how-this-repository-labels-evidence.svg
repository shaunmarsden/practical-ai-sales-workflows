<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 46px; font-weight: 800; fill: #152238; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 400; fill: #152238; }
      .card-heading { font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #152238; }
      .card-body { font-family: Inter, Arial, sans-serif; font-size: 21px; font-weight: 400; fill: #152238; }
      .distinction { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 400; fill: #152238; }
      .distinction-heading { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #152238; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#FFFFFF" />

  <text x="800" y="75" text-anchor="middle" class="title">How This Repository Labels Evidence</text>
  <text x="800" y="115" text-anchor="middle" class="subtitle">Every important fact gets one of four honest labels, never treated as more certain than it is.</text>

  <!-- Card 1: Confirmed -->
  <g transform="translate(80, 160)">
    <rect width="335" height="330" rx="14" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 321 0 A 14 14 0 0 1 335 14 L 335 10 L 0 10 Z" fill="#2A9D8F" />

    <!-- Icon: solid check in a circle -->
    <g transform="translate(142, 30)">
      <circle cx="25" cy="25" r="25" fill="#2A9D8F" />
      <path d="M 13 26 L 21 34 L 38 15" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <text x="167.5" y="115" text-anchor="middle" class="card-heading">Confirmed</text>
    <text x="167.5" y="150" text-anchor="middle" class="card-body">
      <tspan x="167.5" dy="0">Directly supported by</tspan>
      <tspan x="167.5" dy="26">the source material</tspan>
    </text>
  </g>

  <!-- Card 2: Estimate -->
  <g transform="translate(438, 160)">
    <rect width="335" height="330" rx="14" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 321 0 A 14 14 0 0 1 335 14 L 335 10 L 0 10 Z" fill="#2A9D8F" />

    <!-- Icon: a simple gauge/dial signalling a measured guess -->
    <g transform="translate(142, 30)" fill="none" stroke="#2A9D8F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 4 42 A 21 21 0 0 1 46 42" />
      <line x1="25" y1="42" x2="35" y2="26" />
      <circle cx="25" cy="42" r="4" fill="#2A9D8F" stroke="none" />
    </g>

    <text x="167.5" y="115" text-anchor="middle" class="card-heading">Estimate</text>
    <text x="167.5" y="150" text-anchor="middle" class="card-body">
      <tspan x="167.5" dy="0">A number or view given</tspan>
      <tspan x="167.5" dy="26">without measurement</tspan>
    </text>
  </g>

  <!-- Card 3: Inference -->
  <g transform="translate(796, 160)">
    <rect width="335" height="330" rx="14" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 321 0 A 14 14 0 0 1 335 14 L 335 10 L 0 10 Z" fill="#2A9D8F" />

    <!-- Icon: magnifying glass over a small question mark, signalling reasoned reading -->
    <g transform="translate(142, 28)">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#2A9D8F" stroke-width="4" />
      <line x1="31" y1="31" x2="42" y2="42" stroke="#2A9D8F" stroke-width="4" stroke-linecap="round" />
      <text x="20" y="26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2A9D8F">?</text>
    </g>

    <text x="167.5" y="115" text-anchor="middle" class="card-heading">Inference</text>
    <text x="167.5" y="150" text-anchor="middle" class="card-body">
      <tspan x="167.5" dy="0">A reasonable interpretation</tspan>
      <tspan x="167.5" dy="26">that needs checking</tspan>
    </text>
  </g>

  <!-- Card 4: Unknown -->
  <g transform="translate(1154, 160)">
    <rect width="335" height="330" rx="14" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 321 0 A 14 14 0 0 1 335 14 L 335 10 L 0 10 Z" fill="#2A9D8F" />

    <!-- Icon: dashed circle with a question mark, signalling an open gap -->
    <g transform="translate(142, 30)">
      <circle cx="25" cy="25" r="24" fill="none" stroke="#2A9D8F" stroke-width="4" stroke-dasharray="6,6" />
      <text x="25" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#2A9D8F">?</text>
    </g>

    <text x="167.5" y="115" text-anchor="middle" class="card-heading">Unknown</text>
    <text x="167.5" y="150" text-anchor="middle" class="card-body">
      <tspan x="167.5" dy="0">Missing, unclear</tspan>
      <tspan x="167.5" dy="26">or contradictory</tspan>
    </text>
  </g>

  <!-- Important Distinction -->
  <g transform="translate(80, 540)">
    <rect width="1439" height="270" rx="14" fill="#FFFCF0" stroke="#E9C46A" stroke-width="2" />
    <path d="M 0 14 A 14 14 0 0 1 14 0 L 14 0 L 14 270 L 14 270 A 14 14 0 0 1 0 256 Z" fill="#E9C46A" />

    <g transform="translate(48, 50)">
      <rect x="0" y="0" width="238" height="42" rx="10" fill="#E9C46A" fill-opacity="0.3" />
      <text x="17" y="28" class="distinction-heading">Important Distinction</text>
    </g>

    <text x="48" y="150" class="distinction">
      <tspan x="48" dy="0">These are not a quality score. A workflow can be done well and still contain an</tspan>
      <tspan x="48" dy="34">Unknown label. That is honesty, not a defect.</tspan>
    </text>
  </g>
</svg>
