<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" style="background-color: #FFFFFF; font-family: Inter, Arial, sans-serif;">
  <!-- Background -->
  <rect width="1600" height="900" fill="#FFFFFF" />

  <!-- Header Section -->
  <g transform="translate(80, 85)">
    <text x="0" y="32" font-size="38" font-weight="700" fill="#152238" letter-spacing="-0.5px">How This Repository Labels Evidence</text>
    <text x="0" y="72" font-size="20" font-weight="400" fill="#152238" opacity="0.85">Every important fact gets one of four honest labels, never treated as more certain than it is.</text>
  </g>

  <!-- 4 Evidence Cards -->
  <!-- Card 1: Confirmed -->
  <g transform="translate(80, 200)">
    <rect width="335" height="290" rx="12" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 327 0 A 8 8 0 0 1 335 8 L 335 8 L 0 8 Z" fill="#2A9D8F" />
    <rect x="24" y="36" width="160" height="42" rx="8" fill="#2A9D8F" fill-opacity="0.12" />
    <text x="40" y="62" font-size="20" font-weight="700" fill="#152238">Confirmed</text>
    <text x="24" y="125" font-size="18" font-weight="400" fill="#152238">
      <tspan x="24" dy="0">Directly supported by</tspan>
      <tspan x="24" dy="30">the source material</tspan>
    </text>
  </g>

  <!-- Card 2: Estimate -->
  <g transform="translate(448, 200)">
    <rect width="335" height="290" rx="12" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 327 0 A 8 8 0 0 1 335 8 L 335 8 L 0 8 Z" fill="#2A9D8F" />
    <rect x="24" y="36" width="145" height="42" rx="8" fill="#2A9D8F" fill-opacity="0.12" />
    <text x="40" y="62" font-size="20" font-weight="700" fill="#152238">Estimate</text>
    <text x="24" y="125" font-size="18" font-weight="400" fill="#152238">
      <tspan x="24" dy="0">A number or view given</tspan>
      <tspan x="24" dy="30">without measurement</tspan>
    </text>
  </g>

  <!-- Card 3: Inference -->
  <g transform="translate(816, 200)">
    <rect width="335" height="290" rx="12" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 327 0 A 8 8 0 0 1 335 8 L 335 8 L 0 8 Z" fill="#2A9D8F" />
    <rect x="24" y="36" width="155" height="42" rx="8" fill="#2A9D8F" fill-opacity="0.12" />
    <text x="40" y="62" font-size="20" font-weight="700" fill="#152238">Inference</text>
    <text x="24" y="125" font-size="18" font-weight="400" fill="#152238">
      <tspan x="24" dy="0">A reasonable interpretation</tspan>
      <tspan x="24" dy="30">that needs checking</tspan>
    </text>
  </g>

  <!-- Card 4: Unknown -->
  <g transform="translate(1184, 200)">
    <rect width="335" height="290" rx="12" fill="#F4F6F8" stroke="#E2E8F0" stroke-width="1.5" />
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 327 0 A 8 8 0 0 1 335 8 L 335 8 L 0 8 Z" fill="#2A9D8F" />
    <rect x="24" y="36" width="155" height="42" rx="8" fill="#2A9D8F" fill-opacity="0.12" />
    <text x="40" y="62" font-size="20" font-weight="700" fill="#152238">Unknown</text>
    <text x="24" y="125" font-size="18" font-weight="400" fill="#152238">
      <tspan x="24" dy="0">Missing, unclear</tspan>
      <tspan x="24" dy="30">or contradictory</tspan>
    </text>
  </g>

  <!-- Bottom Important Distinction Box -->
  <g transform="translate(80, 540)">
    <rect width="1439" height="260" rx="12" fill="#F4F6F8" stroke="#E9C46A" stroke-width="2" />
    <!-- Left Accent Bar in Warm Amber -->
    <path d="M 0 12 A 12 12 0 0 1 12 0 L 12 0 L 12 260 L 12 260 A 12 12 0 0 1 0 248 Z" fill="#E9C46A" />
    
    <!-- Human Decision / Principle Badge -->
    <g transform="translate(40, 36)">
      <rect x="0" y="0" width="235" height="40" rx="8" fill="#E9C46A" fill-opacity="0.25" />
      <text x="16" y="25" font-size="16" font-weight="700" fill="#152238">Important Distinction</text>
    </g>

    <!-- Main Message -->
    <text x="40" y="125" font-size="21" font-weight="400" fill="#152238">
      <tspan x="40" dy="0">These are not a quality score. A workflow can be done well and still contain an</tspan>
      <tspan x="40" dy="38">Unknown label. That is honesty, not a defect.</tspan>
    </text>
  </g>
</svg>
