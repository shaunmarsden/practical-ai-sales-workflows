    <path d="M360 255l8 18 19 8-19 8-8 19-8-19-19-8 19-8z" fill="#e9c46a"/>
    <text x="305" y="470" text-anchor="middle" font-size="36" font-weight="800" fill="#152238">Start With the Problem</text>
    <text x="305" y="520" text-anchor="middle" font-size="28" fill="#334155">Use safe, relevant information</text>
  </g>

  <g transform="rotate(1.5 800 380)" font-family="Inter, Arial, sans-serif">
    <rect x="585" y="202" width="430" height="390" rx="34" fill="#dbe5eb"/>
    <rect x="575" y="190" width="430" height="390" rx="34" fill="#ffffff" stroke="#152238" stroke-width="4"/>
    <circle cx="625" cy="242" r="34" fill="#152238"/>
    <text x="625" y="254" text-anchor="middle" font-size="34" font-weight="800" fill="#ffffff">2</text>
    <g fill="none" stroke="#2a9d8f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M710 310h55l18-30h70a15 15 0 0 1 15 15v93a15 15 0 0 1-15 15H710a15 15 0 0 1-15-15v-63a15 15 0 0 1 15-15z" fill="#dff5f1"/>
