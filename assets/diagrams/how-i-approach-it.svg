  <path d="M132 650c42-20 75-18 112 3" fill="none" stroke="#e9c46a" stroke-width="7" stroke-linecap="round"/>

  <text x="800" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800" fill="#152238">How I Approach It</text>
  <text x="800" y="126" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" fill="#334155">Start with the sales problem. The tech comes second.</text>

  <path d="M458 366c80-64 110-62 190-4" fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-dasharray="11 13"/>
  <path d="M630 335l24 29-37 5" fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M965 364c78 58 116 57 196-4" fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-dasharray="11 13"/>
  <path d="M1141 337l25 24-34 9" fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="rotate(-2 285 380)" font-family="Inter, Arial, sans-serif">
    <rect x="75" y="190" width="430" height="390" rx="34" fill="#dff5f1"/>
    <rect x="90" y="205" width="430" height="390" rx="34" fill="#ffffff" stroke="#2a9d8f" stroke-width="4"/>
    <circle cx="140" cy="255" r="34" fill="#2a9d8f"/>
    <text x="140" y="267" text-anchor="middle" font-size="34" font-weight="800" fill="#ffffff">1</text>
    <g fill="none" stroke="#152238" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="220" y="250" width="100" height="128" rx="14" fill="#fffdf7"/>
