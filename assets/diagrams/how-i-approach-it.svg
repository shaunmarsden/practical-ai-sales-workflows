    <text x="1295" y="475" text-anchor="middle" font-size="36" font-weight="800" fill="#152238">Keep a Person in Control</text>
    <text x="1295" y="525" text-anchor="middle" font-size="28" fill="#334155">Check, decide, act and improve</text>
  </g>

