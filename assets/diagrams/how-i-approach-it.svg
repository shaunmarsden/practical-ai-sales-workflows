<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title description">
  <title id="title">How I Approach It</title>
  <desc id="description">Three playful illustrated steps: start with the problem using safe information, let AI prepare the work, then keep a person in control of decisions and actions.</desc>

  <rect width="1600" height="720" fill="#fffdf7"/>
  <circle cx="90" cy="88" r="34" fill="#e9c46a" opacity="0.35"/>
  <circle cx="1510" cy="620" r="52" fill="#2a9d8f" opacity="0.12"/>
