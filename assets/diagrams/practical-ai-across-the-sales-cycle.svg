<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Practical AI Across the Sales Cycle</title>
  <desc id="description">Five playful illustrated cards show how AI can help a salesperson find prospects, prepare calls, progress opportunities, support closing and learn from outcomes. The salesperson checks the work and decides what happens next.</desc>

  <rect width="1600" height="900" fill="#fffdf7"/>
  <circle cx="84" cy="94" r="34" fill="#e9c46a" opacity="0.35"/>
  <circle cx="1520" cy="730" r="54" fill="#2a9d8f" opacity="0.12"/>
  <path d="M86 760c45-24 82-22 126 4" fill="none" stroke="#2a9d8f" stroke-width="7" stroke-linecap="round"/>
  <path d="M100 786c35-17 66-15 98 4" fill="none" stroke="#e9c46a" stroke-width="7" stroke-linecap="round"/>

  <text x="800" y="72" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#152238">Practical AI Across the Sales Cycle</text>
  <text x="800" y="122" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="29" fill="#334155">Practical support for real sales work, with the salesperson in control.</text>

