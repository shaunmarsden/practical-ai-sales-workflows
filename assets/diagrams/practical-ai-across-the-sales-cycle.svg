    <rect x="1292" y="170" width="270" height="500" rx="30" fill="#dff5f1"/>
    <rect x="1282" y="180" width="270" height="500" rx="30" fill="#ffffff" stroke="#152238" stroke-width="4"/>
    <circle cx="1328" cy="226" r="29" fill="#152238"/>
