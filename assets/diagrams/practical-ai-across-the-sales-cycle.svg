    <text x="410" y="774" font-size="27" font-weight="700" fill="#152238">AI prepares the work. It does not contact customers or change systems.</text>
    <text x="410" y="816" font-size="27" fill="#334155">The salesperson checks the output and decides what happens next.</text>
