name: Repository checks

# Cheap, deterministic hygiene checks: broken links, skill frontmatter,
# fictional labelling, employer or private references, secret-like values,
# placeholder text, and a committed private context file. These confirm
# structure and safety only. They do not judge whether the content is correct.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run repository checks
        run: python3 .github/scripts/repo_checks.py
